<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 350" width="860" height="350" font-family="ui-monospace, 'SF Mono', Menlo, monospace">

  <!-- Background -->
  <rect width="860" height="350" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="430" y="34" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600" letter-spacing="0.3">LocalVoiceAI — Free Local Voice Input for Any App</text>

  <!-- ── Box 1: Press F10 ── -->
  <rect x="16" y="54" width="148" height="160" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="90" y="82"  text-anchor="middle" fill="#58a6ff" font-size="20">⌨️</text>
  <text x="90" y="104" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">Press</text>
  <text x="90" y="122" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="700">Fn + F10</text>
  <line x1="30" y1="134" x2="150" y2="134" stroke="#30363d" stroke-width="1"/>
  <text x="90" y="152" text-anchor="middle" fill="#8b949e" font-size="11">Hold to record</text>
  <text x="90" y="170" text-anchor="middle" fill="#8b949e" font-size="11">Release to</text>
  <text x="90" y="186" text-anchor="middle" fill="#8b949e" font-size="11">transcribe</text>

  <!-- Arrow 1 -->
  <text x="195" y="128" text-anchor="middle" fill="#8b949e" font-size="10">audio</text>
  <line x1="166" y1="134" x2="200" y2="134" stroke="#484f58" stroke-width="1.5"/>
  <polygon points="200,130 210,134 200,138" fill="#484f58"/>

  <!-- ── Box 2: Microphone ── -->
  <rect x="212" y="54" width="148" height="160" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="286" y="82"  text-anchor="middle" fill="#3fb950" font-size="20">🎙️</text>
  <text x="286" y="104" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">Microphone</text>
  <text x="286" y="122" text-anchor="middle" fill="#8b949e" font-size="11">PortAudio capture</text>
  <line x1="226" y1="134" x2="346" y2="134" stroke="#30363d" stroke-width="1"/>
  <text x="286" y="152" text-anchor="middle" fill="#8b949e" font-size="11">Native sample rate</text>
  <text x="286" y="170" text-anchor="middle" fill="#8b949e" font-size="11">48kHz / 44.1kHz</text>

  <!-- Arrow 2 -->
  <text x="358" y="128" text-anchor="middle" fill="#8b949e" font-size="10">wav</text>
  <line x1="362" y1="134" x2="396" y2="134" stroke="#484f58" stroke-width="1.5"/>
  <polygon points="396,130 406,134 396,138" fill="#484f58"/>

  <!-- ── Box 3: LocalVoiceAI (highlighted) ── -->
  <rect x="408" y="44" width="158" height="180" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="487" y="74"  text-anchor="middle" fill="#58a6ff" font-size="20">⚡</text>
  <text x="487" y="96"  text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">LocalVoiceAI</text>
  <text x="487" y="114" text-anchor="middle" fill="#8b949e" font-size="11">whisper-cli</text>
  <text x="487" y="132" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600">Apple Metal GPU</text>
  <line x1="422" y1="144" x2="552" y2="144" stroke="#30363d" stroke-width="1"/>
  <text x="487" y="162" text-anchor="middle" fill="#8b949e" font-size="11">On-device · No cloud</text>
  <text x="487" y="180" text-anchor="middle" fill="#8b949e" font-size="11">No API key · Free</text>
  <text x="487" y="198" text-anchor="middle" fill="#8b949e" font-size="11">~1–2s latency</text>

  <!-- Arrow 3 -->
  <text x="574" y="128" text-anchor="middle" fill="#8b949e" font-size="10">text</text>
  <line x1="568" y1="134" x2="602" y2="134" stroke="#484f58" stroke-width="1.5"/>
  <polygon points="602,130 612,134 602,138" fill="#484f58"/>

  <!-- ── Box 4: Any App ── -->
  <rect x="614" y="54" width="230" height="160" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="729" y="78" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="700">Paste into any app</text>
  <line x1="628" y1="86" x2="830" y2="86" stroke="#30363d" stroke-width="1"/>
  <text x="634" y="108" fill="#e6edf3" font-size="13">🤖</text>
  <text x="658" y="108" fill="#8b949e" font-size="12">Claude / Claude Code</text>
  <text x="634" y="128" fill="#e6edf3" font-size="13">🖱️</text>
  <text x="658" y="128" fill="#8b949e" font-size="12">Cursor</text>
  <text x="634" y="148" fill="#e6edf3" font-size="13">💻</text>
  <text x="658" y="148" fill="#8b949e" font-size="12">VS Code</text>
  <text x="634" y="168" fill="#e6edf3" font-size="13">🌐</text>
  <text x="658" y="168" fill="#8b949e" font-size="12">Browser</text>
  <text x="634" y="188" fill="#e6edf3" font-size="13">📝</text>
  <text x="658" y="188" fill="#8b949e" font-size="12">Notes / Docs / Slack</text>

  <!-- ── Service lifecycle bar ── -->
  <rect x="16" y="234" width="828" height="96" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="430" y="256" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600" letter-spacing="0.3">Service lifecycle</text>

  <!-- Dividers -->
  <line x1="222" y1="264" x2="222" y2="318" stroke="#30363d" stroke-width="1"/>
  <line x1="428" y1="264" x2="428" y2="318" stroke="#30363d" stroke-width="1"/>
  <line x1="634" y1="264" x2="634" y2="318" stroke="#30363d" stroke-width="1"/>

  <!-- Col 1: install -->
  <text x="111" y="284" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="700">make install</text>
  <text x="111" y="302" text-anchor="middle" fill="#8b949e" font-size="11">one-time setup</text>
  <text x="111" y="318" text-anchor="middle" fill="#8b949e" font-size="11">grant permissions once</text>

  <!-- Col 2: start -->
  <text x="325" y="284" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="700">make start</text>
  <text x="325" y="302" text-anchor="middle" fill="#8b949e" font-size="11">begin listening</text>
  <text x="325" y="318" text-anchor="middle" fill="#8b949e" font-size="11">works in any terminal / IDE</text>

  <!-- Col 3: stop -->
  <text x="531" y="284" text-anchor="middle" fill="#f85149" font-size="13" font-weight="700">make stop</text>
  <text x="531" y="302" text-anchor="middle" fill="#8b949e" font-size="11">stop listening</text>
  <text x="531" y="318" text-anchor="middle" fill="#8b949e" font-size="11">F10 goes back to normal</text>

  <!-- Col 4: status -->
  <text x="737" y="284" text-anchor="middle" fill="#d29922" font-size="13" font-weight="700">make status</text>
  <text x="737" y="302" text-anchor="middle" fill="#8b949e" font-size="11">check if running</text>
  <text x="737" y="318" text-anchor="middle" fill="#8b949e" font-size="11">tail -f /tmp/localvoice.log</text>

</svg>
